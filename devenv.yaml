# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  # No jj CLI pin: gitman embeds jj-lib in-process via pyjutsu (built from ../Pyjutsu).
  # The jj 0.38 pin lives solely in pyjutsu (Cargo.toml + its devenv); gitman inherits it.
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
  nix2container:
    url: github:nlewo/nix2container
  mk-shell-bin:
    url: github:rrbutani/nix-mk-shell-bin
